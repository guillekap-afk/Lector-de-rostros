<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mi App de Fotos</title>

    <!-- Vinculación del manifiesto PWA para que parezca nativa -->
    <link rel="manifest" href="manifest.json">
   
    <!-- Configuración para pantalla completa obligatoria en iPhone (iOS) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Fotos">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
            position: relative;
        }
        video {
            width: 100%;
            max-height: 75vh;
            object-fit: cover;
            background-color: #222;
            z-index: 1;
        }
        .contenedor-controles {
            margin-top: 20px;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 10;
        }
        /* Botón obturador en pantalla */
        #boton-camara {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: #fff;
            border: 5px solid #444;
            cursor: pointer;
            outline: none;
        }
        #boton-camara:active {
            background-color: #ccc;
        }
        /* Contenedor del secreto (puede ser texto o imagen) */
        #resultado {
            position: absolute;
            top: 30%;
            font-size: 32px;
            font-weight: bold;
            color: #ffeb3b;
            text-shadow: 2px 2px 4px #000;
            text-align: center;
            z-index: 5;
            width: 90%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #resultado img {
            max-width: 80%;
            max-height: 40vh;
            object-fit: contain;
            filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.7));
        }
        
        /* --- ZONA SECRETA DE CONFIGURACIÓN --- */
        #zona-secreta {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 80px;
            height: 80px;
            /* NOTA: Ahora está en ROJO para que lo encuentres al probar. */
            /* Luego cambia "rgba(255, 0, 0, 0.4)" por "transparent" */
            background-color: rgba(255, 0, 0, 0.4); 
            cursor: pointer;
            z-index: 9999; /* Máxima prioridad, nada lo tapa */
        }
    </style>
</head>
<body>

    <!-- El visor de la cámara -->
    <video id="video" autoplay playsinline></video>

    <!-- El botón del obturador visible -->
    <div class="contenedor-controles">
        <button id="boton-camara" onclick="presionarObturador()"></button>
    </div>

    <!-- Espacio donde se revelará el secreto -->
    <div id="resultado"></div>

    <!-- Cuadrado de configuración (abajo a la derecha) -->
    <div id="zona-secreta" onclick="configurarTruco()" ontouchstart="configurarTruco()"></div>

    <script>
        let pantallaCompletaActivada = false;
        let prediccionProgramada = "Presente"; 

        // --- CÁMARA TRASERA ---
        const video = document.getElementById('video');
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false })
            .then(stream => { video.srcObject = stream; })
            .catch(err => { console.error("Error de cámara: ", err); });

        // --- FUNCIÓN PARA ABRIR EL CUADRO ---
        function configurarTruco(e) {
            // Evitamos que el toque se duplique entre click y touch
            if (e) e.preventDefault(); 
            
            let eleccion = prompt("Ingresa una palabra O el nombre de una imagen (ej: carta.png):", prediccionProgramada);
            if (eleccion !== null) {
                prediccionProgramada = eleccion.trim();
            }
        }

        // --- LÓGICA DE LOS DOS TOQUES ---
        function presionarObturador() {
            const elemento = document.documentElement;

            if (!pantallaCompletaActivada) {
                if (elemento.requestFullscreen) {
                    elemento.requestFullscreen();
                } else if (elemento.webkitRequestFullscreen) {
                    elemento.webkitRequestFullscreen();
                } else if (elemento.mozRequestFullScreen) {
                    elemento.mozRequestFullScreen();
                } else if (elemento.msRequestFullscreen) {
                    elemento.msRequestFullscreen();
                }
                pantallaCompletaActivada = true;
            } else {
                ejecutarCapturaDeFoto();
            }
        }

        // --- REVELACIÓN ---
        function ejecutarCapturaDeFoto() {
            const contenedorResultado = document.getElementById('resultado');
            contenedorResultado.innerHTML = "";

            if (prediccionProgramada.toLowerCase().endsWith('.png') || prediccionProgramada.toLowerCase().endsWith('.jpg')) {
                const imagenSecreta = document.createElement('img');
                imagenSecreta.src = prediccionProgramada; 
                imagenSecreta.alt = "Predicción";
                contenedorResultado.appendChild(imagenSecreta);
            } else {
                contenedorResultado.innerText = prediccionProgramada;
            }
        }
    </script>
</body>
</html>
