<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mi App de Fotos</title>

    <!-- Vinculación del manifiesto PWA para que parezca nativa -->
    <link rel="manifest" href="manifest.json">
   
    <!-- Configuración para pantalla completa obligatoria en iPhone (iOS) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Fotos">

    <style>
        /* Estilos básicos para centrar la cámara y el botón en el celular */
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        video {
            width: 100%;
            max-height: 75vh;
            object-fit: cover;
            background-color: #222;
        }
        .contenedor-controles {
            margin-top: 20px;
            width: 100%;
            display: flex;
            justify-content: center;
        }
        /* Tu botón obturador en pantalla */
        #boton-camara {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: #fff;
            border: 5px solid #444;
            cursor: pointer;
            outline: none;
        }
        #boton-camara:active {
            background-color: #ccc;
        }
        #resultado {
            margin-top: 10px;
            font-size: 24px;
            font-weight: bold;
            color: #ffeb3b;
        }
    </style>
</head>
<body>

    <!-- El visor de la cámara -->
    <video id="video" autoplay playsinline></video>

    <!-- El botón del obturador -->
    <div class="contenedor-controles">
        <button id="boton-camara" onclick="presionarObturador()"></button>
    </div>

    <!-- Lugar donde aparecerá el texto o imagen programada -->
    <div id="resultado"></div>

    <script>
        // --- CONFIGURACIÓN DE LA CÁMARA AL ARRANCAR ---
        const video = document.getElementById('video');
        
        // Activa la cámara trasera automáticamente al abrir la web
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false })
            .then(stream => {
                video.srcObject = stream;
            })
            .catch(err => {
                console.error("Error al acceder a la cámara: ", err);
            });


        // --- LÓGICA DEL PRIMER Y SEGUNDO TOQUE (PANTALLA COMPLETA) ---
        let pantallaCompletaActivada = false;

        function presionarObturador() {
            const elemento = document.documentElement; // Toda la página web

            if (!pantallaCompletaActivada) {
                // --- PRIMER TOQUE: Oculta las barras de navegación ---
                if (elemento.requestFullscreen) {
                    elemento.requestFullscreen();
                } else if (elemento.webkitRequestFullscreen) { /* Safari e iOS */
                    elemento.webkitRequestFullscreen();
                } else if (elemento.mozRequestFullScreen) { /* Firefox */
                    elemento.mozRequestFullScreen();
                } else if (elemento.msRequestFullscreen) { /* IE/Edge */
                    elemento.msRequestFullscreen();
                }

                // Cambiamos el estado: el celular ya está limpio y sin barras
                pantallaCompletaActivada = true;
                console.log("Modo nativo activo. Próximo toque saca la foto.");

            } else {
                // --- SEGUNDO TOQUE EN ADELANTE: Saca la foto y ejecuta la magia ---
                ejecutarCapturaDeFoto();
            }
        }

        // --- LA FUNCIÓN QUE CORRE TU MAGIA ---
        function ejecutarCapturaDeFoto() {
            console.log("¡Foto tomada!");
            
            // Aquí se muestra la palabra o imagen que programamos para tu rutina
            const contenedorResultado = document.getElementById('resultado');
            contenedorResultado.innerText = "¡AQUÍ TU PALABRA PROGRAMADA!"; 
            
            // Si tenías código de canvas para congelar la imagen, iría aquí abajo:
            // ...
        }
    </script>
</body>
</html>
