<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mi App de Fotos</title>

    <link rel="manifest" href="manifest.json">
   
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Fotos">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
            position: relative;
        }
        /* Contenedor donde se muestra el video o la foto congelada */
        #contenedor-vista {
            width: 100%;
            max-height: 75vh;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #222;
        }
        video, canvas {
            width: 100%;
            object-fit: cover;
        }
        canvas {
            display: none; /* Oculto hasta que se saca la foto */
        }
        .contenedor-controles {
            margin-top: 20px;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 10;
        }
        #boton-camara {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: #fff;
            border: 5px solid #444;
            cursor: pointer;
            outline: none;
        }
        #boton-camara:active {
            background-color: #ccc;
        }
        /* Contenedor del secreto superpuesto */
        #resultado {
            position: absolute;
            top: 30%;
            font-size: 32px;
            font-weight: bold;
            color: #ffeb3b;
            text-shadow: 2px 2px 4px #000;
            text-align: center;
            z-index: 5;
            width: 90%;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }
        #resultado img {
            max-width: 80%;
            max-height: 40vh;
            object-fit: contain;
            filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.7));
        }
        
        /* --- ZONA SECRETA TOTALMENTE INVISIBLE --- */
        #zona-secreta {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50vh; 
            background-color: transparent; /* AHORA SÍ ES INVISIBLE */
            cursor: pointer;
            z-index: 9999;
        }
    </style>
</head>
<body>

    <div id="contenedor-vista">
        <!-- El visor en vivo -->
        <video id="video" autoplay playsinline></video>
        <!-- La foto capturada -->
        <canvas id="canvas"></canvas>
        <!-- El secreto revelado -->
        <div id="resultado"></div>
    </div>

    <div class="contenedor-controles">
        <button id="boton-camara" onclick="presionarObturador()"></button>
    </div>

    <!-- Zona invisible (Mitad superior de la pantalla) -->
    <div id="zona-secreta" onclick="configurarTruco(event)"></div>

    <script>
        let pantallaCompletaActivada = false;
        let prediccionProgramada = "Presente"; 

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const contenedorResultado = document.getElementById('resultado');

        // --- ARRANCAR CÁMARA ---
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false })
            .then(stream => { video.srcObject = stream; })
            .catch(err => { console.error("Error de cámara: ", err); });

        // --- MENÚ OCULTO ---
        function configurarTruco(e) {
            if (e) e.stopPropagation();
            let eleccion = prompt("Ingresa palabra o archivo (ej: carta.png):", prediccionProgramada);
            if (eleccion !== null) {
                prediccionProgramada = eleccion.trim();
            }
        }

        // --- LÓGICA DE DOS TOQUES ---
        function presionarObturador() {
            const elemento = document.documentElement;

            if (!pantallaCompletaActivada) {
                // PRIMER TOQUE: Limpia la pantalla
                if (elemento.requestFullscreen) { elemento.requestFullscreen(); }
                else if (elemento.webkitRequestFullscreen) { elemento.webkitRequestFullscreen(); }
                
                pantallaCompletaActivada = true;
            } else {
                // SEGUNDO TOQUE: Captura real y magia
                sacarFotoReal();
            }
        }

        // --- CONGELAR IMAGEN Y MOSTRAR SECRETO ---
        function sacarFotoReal() {
            // Ajustamos el tamaño del canvas al tamaño real del video
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            // Dibujamos el frame actual del video en el canvas
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Intercambiamos pantallas: ocultamos video en vivo, mostramos foto fija
            video.style.display = 'none';
            canvas.style.display = 'block';

            // Apagamos la cámara trasera para ahorrar batería
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }

            // Mostramos el secreto configurado encima de la foto
            contenedorResultado.innerHTML = "";
            if (prediccionProgramada.toLowerCase().endsWith('.png') || prediccionProgramada.toLowerCase().endsWith('.jpg')) {
                const imagenSecreta = document.createElement('img');
                imagenSecreta.src = prediccionProgramada;
                contenedorResultado.appendChild(imagenSecreta);
            } else {
                contenedorResultado.innerText = prediccionProgramada;
            }
        }
    </script>
</body>
</html>
